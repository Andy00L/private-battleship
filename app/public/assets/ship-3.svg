<svg xmlns="http://www.w3.org/2000/svg" width="144" height="48" viewBox="0 0 144 48" fill="none">
  <!-- Hull main body -->
  <path d="M6 17 C4 20 3 22 3 24 C3 26 4 28 6 31 L12 35 L120 35 L130 31 L138 27 L141 24 L138 21 L130 17 L120 13 L12 13 Z" fill="#6b7280" stroke="#4b5563" stroke-width="1" stroke-linejoin="round"/>
  
  <!-- Deck surface -->
  <path d="M14 16 L118 16 L128 19 L134 22 L134 26 L128 29 L118 32 L14 32 L10 29 L8 24 L10 19 Z" fill="#79818b"/>
  
  <!-- Flight deck center line -->
  <line x1="20" y1="24" x2="130" y2="24" stroke="#d1d5db" stroke-width="0.8" stroke-dasharray="5 3" opacity="0.6"/>
  
  <!-- Cross deck markings -->
  <line x1="36" y1="18" x2="36" y2="30" stroke="#9ca3af" stroke-width="0.4" opacity="0.35"/>
  <line x1="56" y1="17" x2="56" y2="31" stroke="#9ca3af" stroke-width="0.4" opacity="0.35"/>
  <line x1="76" y1="17" x2="76" y2="31" stroke="#9ca3af" stroke-width="0.4" opacity="0.35"/>
  <line x1="96" y1="17" x2="96" y2="31" stroke="#9ca3af" stroke-width="0.4" opacity="0.35"/>
  <line x1="116" y1="18" x2="116" y2="30" stroke="#9ca3af" stroke-width="0.4" opacity="0.35"/>

  <!-- Island / Command tower -->
  <rect x="84" y="15" width="14" height="9" rx="1.5" fill="#9ca3af" stroke="#4b5563" stroke-width="0.6"/>
  <rect x="86" y="16.5" width="4" height="3.5" rx="0.5" fill="#bcc3cd"/>
  <line x1="91" y1="15" x2="91" y2="11.5" stroke="#9ca3af" stroke-width="0.7"/>
  <circle cx="91" cy="11" r="1" fill="#06b6d4" opacity="0.9"/>
  
  <!-- Hangar block (rear) -->
  <rect x="18" y="19.5" width="16" height="9" rx="1" fill="#5e6672" stroke="#4b5563" stroke-width="0.5"/>
  <rect x="20" y="21" width="5" height="6" rx="0.5" fill="#4b5563" opacity="0.8"/>
  <rect x="27" y="21" width="5" height="6" rx="0.5" fill="#4b5563" opacity="0.8"/>
  
  <!-- Parked aircraft silhouettes -->
  <polygon points="60,20.5 55,23 55,25 60,27.5 61,24" fill="#8b939d" opacity="0.5"/>
  <polygon points="72,20.5 67,23 67,25 72,27.5 73,24" fill="#8b939d" opacity="0.5"/>
  
  <!-- Bow catapult rails -->
  <line x1="110" y1="20" x2="130" y2="22.5" stroke="#b0b8c4" stroke-width="0.5" opacity="0.45"/>
  <line x1="110" y1="28" x2="130" y2="25.5" stroke="#b0b8c4" stroke-width="0.5" opacity="0.45"/>
  
  <!-- Top hull edge highlight -->
  <path d="M12 13 L120 13 L130 17" fill="none" stroke="#8b939d" stroke-width="0.4" opacity="0.5"/>
</svg>
