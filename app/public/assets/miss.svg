<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Outer ripple -->
  <circle cx="24" cy="24" r="20" stroke="#7dd3fc" stroke-width="0.8" opacity="0.25" fill="none"/>
  
  <!-- Middle-outer ripple -->
  <circle cx="24" cy="24" r="16" stroke="#7dd3fc" stroke-width="1" opacity="0.3" fill="none"/>
  
  <!-- Middle ripple -->
  <circle cx="24" cy="24" r="12" stroke="#0ea5e9" stroke-width="1.2" opacity="0.45" fill="none"/>
  
  <!-- Inner ripple -->
  <circle cx="24" cy="24" r="7.5" stroke="#38bdf8" stroke-width="1.5" opacity="0.65" fill="none"/>
  
  <!-- Core ripple -->
  <circle cx="24" cy="24" r="3.5" stroke="#38bdf8" stroke-width="1.8" opacity="0.8" fill="none"/>
  
  <!-- Center splash dot -->
  <circle cx="24" cy="24" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="24" cy="24" r="0.8" fill="#ffffff" opacity="0.9"/>
  
  <!-- Splash droplets (small dots around center) -->
  <circle cx="24" cy="17" r="0.8" fill="#38bdf8" opacity="0.5"/>
  <circle cx="30" cy="19" r="0.6" fill="#38bdf8" opacity="0.4"/>
  <circle cx="18" cy="20" r="0.7" fill="#38bdf8" opacity="0.45"/>
  <circle cx="28" cy="30" r="0.6" fill="#38bdf8" opacity="0.35"/>
  <circle cx="19" cy="29" r="0.7" fill="#38bdf8" opacity="0.4"/>
</svg>
